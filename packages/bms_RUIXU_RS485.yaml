# =============================================================================
# YamBMS - Ruixu BMS RS485 Package
# File: packages/bms/bms_RUIXU_RS485.yaml
#
# Based on:
#   - easybotics/esphome-ruixu-bms (Ruixu-specific protocol corrections)
#   - syssi/esphome-seplos-bms      (upstream Seplos V1/V2 component)
#   - Sleeper85/esphome-yambms      (sensor naming contract + bms_combine glue)
#
# Drop this file into your local packages/bms/ folder alongside the existing
# bms_SEPLOS_V1_V2_RS485.yaml.  It is a drop-in replacement — use it exactly
# the same way in your main YAML.
#
# IMPORTANT PROTOCOL NOTES (Ruixu vs Seplos):
#   1. Baud rate  : 9600 baud  (some units ship at 19200 — check your BMS)
#   2. Address    : DIP-switch selectable, default 0x00 for pack 0
#   3. Protocol   : 0x20  (same SOI/VER/ADR/CID1/CID2/LENGTH/CHKSUM frame as
#                          Seplos V1, BUT current sign is inverted — negative
#                          values indicate charging on Ruixu whereas Seplos
#                          reports them as positive.  The lambda below corrects
#                          this so YamBMS sees the same sign convention.)
#   4. Cell count : 16S  (change bms_cell_count substitution if you use 8S/15S)
#   5. Temperature: T1..T4 + ambient (5 temp sensors, same as Seplos)
#
# USAGE in your main YAML  (single-node, local-packages style):
#
#   packages:
#     bms1:
#       file: packages/bms/bms_RUIXU_RS485.yaml
#       vars:
#         bms_id:         '1'
#         bms_name:       'Ruixu BMS 1'
#         bms_uart_id:    'uart_esp_1'
#         bms_address:    '0x00'        # DIP switch pack address (0x00 = pack 1)
#         bms_update_interval: '5s'
#         bms_cell_count: '16'          # cells in series
#
#   For pack 2 on the same RS485 bus, add another entry with bms_id='2',
#   bms_address='0x01', and the same bms_uart_id.
# =============================================================================

substitutions:
  # ----- Required vars (must be supplied by the importer) -----
  bms_id:              '1'
  bms_name:            'Ruixu BMS 1'
  bms_uart_id:         'uart_esp_1'
  bms_address:         '0x00'
  bms_update_interval: '5s'
  bms_cell_count:      '16'


# ---------------------------------------------------------------------------
# External component — the Seplos-protocol component from syssi is re-used
# because the Ruixu BMS speaks the same wire format.  easybotics forked this
# and confirmed the component itself needs no C++ changes; the corrections are
# all in sensor lambdas (sign inversion, temperature offset).
# ---------------------------------------------------------------------------
external_components:
  - source: github://easybotics/esphome-ruixu-bms@main
    components: [seplos_modbus, seplos_bms]
    refresh: 0s


# ---------------------------------------------------------------------------
# Seplos modbus bus — one per UART.  If you have two packs on the same UART,
# only declare this section once (put it in your board YAML or in the first
# BMS package and use !extend for subsequent packs).
# ---------------------------------------------------------------------------
seplos_modbus:
  - id: seplos_modbus_${bms_id}
    uart_id: ${bms_uart_id}
    rx_timeout: 150ms
    # flow_control_pin: GPIO4   # Uncomment if your RS485 module needs DE/RE


# ---------------------------------------------------------------------------
# Seplos BMS device declaration
# ---------------------------------------------------------------------------
seplos_bms:
  - id: ruixu_bms_${bms_id}
    address: ${bms_address}
    # 0x20 = standard Seplos/Pylon protocol (Ruixu uses this)
    protocol_version: 0x20
    seplos_modbus_id: seplos_modbus_${bms_id}
    update_interval: ${bms_update_interval}


# ---------------------------------------------------------------------------
# Sensors — names follow the YamBMS sensor-ID contract exactly so that
# bms_combine.yaml can reference them by the bms_id substitution variable.
#
# YamBMS mandatory IDs (bms_combine reads these):
#   bms${bms_id}_total_voltage
#   bms${bms_id}_current            ← sign: + discharge, − charge
#   bms${bms_id}_power
#   bms${bms_id}_soc
#   bms${bms_id}_capacity_remaining
#   bms${bms_id}_min_cell_voltage
#   bms${bms_id}_max_cell_voltage
#   bms${bms_id}_delta_cell_voltage
#   bms${bms_id}_max_temperature
#   bms${bms_id}_errors_bitmask
#   bms${bms_id}_charging_switch     (binary_sensor)
#   bms${bms_id}_discharging_switch  (binary_sensor)
#   bms${bms_id}_online_status       (binary_sensor)
# ---------------------------------------------------------------------------
sensor:

  # ── Pack voltage ──────────────────────────────────────────────────────────
  - platform: seplos_bms
    seplos_bms_id: ruixu_bms_${bms_id}
    total_battery_voltage:
      id: bms${bms_id}_total_voltage
      name: "${bms_name} Battery Voltage"
      unit_of_measurement: V
      accuracy_decimals: 3

  # ── Current  (Ruixu sign fix: the raw component returns negative=discharge,
  #              but YamBMS expects positive=discharge.  Multiply by -1.) ────
  - platform: seplos_bms
    seplos_bms_id: ruixu_bms_${bms_id}
    current:
      id: bms${bms_id}_current_raw
      internal: true          # hide raw sensor; corrected value exposed below

  - platform: template
    id: bms${bms_id}_current
    name: "${bms_name} Battery Current"
    unit_of_measurement: A
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    update_interval: ${bms_update_interval}
    lambda: |-
      // Ruixu reports current with inverted sign vs YamBMS convention.
      // Positive = discharging,  Negative = charging.
      if (!isnan(id(bms${bms_id}_current_raw).state)) {
        return id(bms${bms_id}_current_raw).state * -1.0f;
      }
      return NAN;

  # ── Power (derived) ───────────────────────────────────────────────────────
  - platform: template
    id: bms${bms_id}_power
    name: "${bms_name} Battery Power"
    unit_of_measurement: W
    accuracy_decimals: 1
    device_class: power
    state_class: measurement
    update_interval: ${bms_update_interval}
    lambda: |-
      if (!isnan(id(bms${bms_id}_total_voltage).state) &&
          !isnan(id(bms${bms_id}_current).state)) {
        return id(bms${bms_id}_total_voltage).state *
               id(bms${bms_id}_current).state;
      }
      return NAN;

  # ── State of Charge ───────────────────────────────────────────────────────
  - platform: seplos_bms
    seplos_bms_id: ruixu_bms_${bms_id}
    state_of_charge:
      id: bms${bms_id}_soc
      name: "${bms_name} Battery SOC"
      unit_of_measurement: "%"
      accuracy_decimals: 1

  # ── Remaining capacity ────────────────────────────────────────────────────
  - platform: seplos_bms
    seplos_bms_id: ruixu_bms_${bms_id}
    residual_capacity:
      id: bms${bms_id}_capacity_remaining
      name: "${bms_name} Capacity Remaining"
      unit_of_measurement: Ah
      accuracy_decimals: 2

  # ── Total capacity ────────────────────────────────────────────────────────
  - platform: seplos_bms
    seplos_bms_id: ruixu_bms_${bms_id}
    rated_capacity:
      id: bms${bms_id}_capacity_total
      name: "${bms_name} Capacity Total"
      unit_of_measurement: Ah
      accuracy_decimals: 2

  # ── Cell voltages (16 cells) ──────────────────────────────────────────────
  - platform: seplos_bms
    seplos_bms_id: ruixu_bms_${bms_id}
    cell_voltage_1:  { id: bms${bms_id}_cell_voltage_01, name: "${bms_name} Cell Voltage 01", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_2:  { id: bms${bms_id}_cell_voltage_02, name: "${bms_name} Cell Voltage 02", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_3:  { id: bms${bms_id}_cell_voltage_03, name: "${bms_name} Cell Voltage 03", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_4:  { id: bms${bms_id}_cell_voltage_04, name: "${bms_name} Cell Voltage 04", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_5:  { id: bms${bms_id}_cell_voltage_05, name: "${bms_name} Cell Voltage 05", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_6:  { id: bms${bms_id}_cell_voltage_06, name: "${bms_name} Cell Voltage 06", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_7:  { id: bms${bms_id}_cell_voltage_07, name: "${bms_name} Cell Voltage 07", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_8:  { id: bms${bms_id}_cell_voltage_08, name: "${bms_name} Cell Voltage 08", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_9:  { id: bms${bms_id}_cell_voltage_09, name: "${bms_name} Cell Voltage 09", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_10: { id: bms${bms_id}_cell_voltage_10, name: "${bms_name} Cell Voltage 10", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_11: { id: bms${bms_id}_cell_voltage_11, name: "${bms_name} Cell Voltage 11", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_12: { id: bms${bms_id}_cell_voltage_12, name: "${bms_name} Cell Voltage 12", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_13: { id: bms${bms_id}_cell_voltage_13, name: "${bms_name} Cell Voltage 13", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_14: { id: bms${bms_id}_cell_voltage_14, name: "${bms_name} Cell Voltage 14", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_15: { id: bms${bms_id}_cell_voltage_15, name: "${bms_name} Cell Voltage 15", unit_of_measurement: V, accuracy_decimals: 3 }
    cell_voltage_16: { id: bms${bms_id}_cell_voltage_16, name: "${bms_name} Cell Voltage 16", unit_of_measurement: V, accuracy_decimals: 3 }

  # ── Min / Max / Delta cell voltage (derived — YamBMS uses these directly) ─
  - platform: template
    id: bms${bms_id}_min_cell_voltage
    name: "${bms_name} Min Cell Voltage"
    unit_of_measurement: V
    accuracy_decimals: 3
    device_class: voltage
    state_class: measurement
    update_interval: ${bms_update_interval}
    lambda: |-
      float min_v = 9.0f;
      float v;
      v = id(bms${bms_id}_cell_voltage_01).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_02).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_03).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_04).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_05).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_06).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_07).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_08).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_09).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_10).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_11).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_12).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_13).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_14).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_15).state; if (!isnan(v) && v < min_v) min_v = v;
      v = id(bms${bms_id}_cell_voltage_16).state; if (!isnan(v) && v < min_v) min_v = v;
      return (min_v < 9.0f) ? min_v : NAN;

  - platform: template
    id: bms${bms_id}_max_cell_voltage
    name: "${bms_name} Max Cell Voltage"
    unit_of_measurement: V
    accuracy_decimals: 3
    device_class: voltage
    state_class: measurement
    update_interval: ${bms_update_interval}
    lambda: |-
      float max_v = 0.0f;
      float v;
      v = id(bms${bms_id}_cell_voltage_01).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_02).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_03).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_04).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_05).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_06).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_07).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_08).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_09).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_10).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_11).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_12).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_13).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_14).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_15).state; if (!isnan(v) && v > max_v) max_v = v;
      v = id(bms${bms_id}_cell_voltage_16).state; if (!isnan(v) && v > max_v) max_v = v;
      return (max_v > 0.0f) ? max_v : NAN;

  - platform: template
    id: bms${bms_id}_delta_cell_voltage
    name: "${bms_name} Delta Cell Voltage"
    unit_of_measurement: V
    accuracy_decimals: 3
    device_class: voltage
    state_class: measurement
    update_interval: ${bms_update_interval}
    lambda: |-
      if (!isnan(id(bms${bms_id}_max_cell_voltage).state) &&
          !isnan(id(bms${bms_id}_min_cell_voltage).state)) {
        return id(bms${bms_id}_max_cell_voltage).state -
               id(bms${bms_id}_min_cell_voltage).state;
      }
      return NAN;

  # ── Temperatures ──────────────────────────────────────────────────────────
  # Ruixu uses the same 5-sensor layout as Seplos (T1-T4 cell, T5 ambient).
  # The Seplos component returns values already in °C.
  - platform: seplos_bms
    seplos_bms_id: ruixu_bms_${bms_id}
    temperature_1: { id: bms${bms_id}_temperature_1, name: "${bms_name} Temperature 1", unit_of_measurement: °C, accuracy_decimals: 1 }
    temperature_2: { id: bms${bms_id}_temperature_2, name: "${bms_name} Temperature 2", unit_of_measurement: °C, accuracy_decimals: 1 }
    temperature_3: { id: bms${bms_id}_temperature_3, name: "${bms_name} Temperature 3", unit_of_measurement: °C, accuracy_decimals: 1 }
    temperature_4: { id: bms${bms_id}_temperature_4, name: "${bms_name} Temperature 4", unit_of_measurement: °C, accuracy_decimals: 1 }
    temperature_5: { id: bms${bms_id}_temperature_5, name: "${bms_name} Temperature Ambient", unit_of_measurement: °C, accuracy_decimals: 1 }

  # Max temperature — YamBMS bms_combine reads this ID
  - platform: template
    id: bms${bms_id}_max_temperature
    name: "${bms_name} Max Temperature"
    unit_of_measurement: °C
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    update_interval: ${bms_update_interval}
    lambda: |-
      float max_t = -100.0f;
      float t;
      t = id(bms${bms_id}_temperature_1).state; if (!isnan(t) && t > max_t) max_t = t;
      t = id(bms${bms_id}_temperature_2).state; if (!isnan(t) && t > max_t) max_t = t;
      t = id(bms${bms_id}_temperature_3).state; if (!isnan(t) && t > max_t) max_t = t;
      t = id(bms${bms_id}_temperature_4).state; if (!isnan(t) && t > max_t) max_t = t;
      return (max_t > -100.0f) ? max_t : NAN;

  # ── Cycle count ───────────────────────────────────────────────────────────
  - platform: seplos_bms
    seplos_bms_id: ruixu_bms_${bms_id}
    cycle_count:
      id: bms${bms_id}_cycle_count
      name: "${bms_name} Cycle Count"
      unit_of_measurement: ""
      accuracy_decimals: 0

  # ── Errors bitmask — passed straight through from the component ───────────
  - platform: seplos_bms
    seplos_bms_id: ruixu_bms_${bms_id}
    errors_bitmask:
      id: bms${bms_id}_errors_bitmask
      name: "${bms_name} Errors Bitmask"
      unit_of_measurement: ""
      accuracy_decimals: 0


# ---------------------------------------------------------------------------
# Binary sensors — YamBMS bms_combine uses these three IDs for every BMS
# ---------------------------------------------------------------------------
binary_sensor:

  # Charging allowed  — derived from the protection alarm bitmask bit 0
  - platform: template
    id: bms${bms_id}_charging_switch
    name: "${bms_name} Charging Allowed"
    device_class: battery_charging
    lambda: |-
      // bit 0 of errors_bitmask = charge protection active (0 = allowed)
      if (!isnan(id(bms${bms_id}_errors_bitmask).state)) {
        return ((int)id(bms${bms_id}_errors_bitmask).state & 0x0001) == 0;
      }
      return false;

  # Discharging allowed — derived from bitmask bit 1
  - platform: template
    id: bms${bms_id}_discharging_switch
    name: "${bms_name} Discharging Allowed"
    lambda: |-
      if (!isnan(id(bms${bms_id}_errors_bitmask).state)) {
        return ((int)id(bms${bms_id}_errors_bitmask).state & 0x0002) == 0;
      }
      return false;

  # Online status — BMS is online when voltage sensor has a valid recent value
  - platform: template
    id: bms${bms_id}_online_status
    name: "${bms_name} Online Status"
    device_class: connectivity
    lambda: |-
      return !isnan(id(bms${bms_id}_total_voltage).state) &&
             id(bms${bms_id}_total_voltage).state > 0.0f;
