# =============================================================================
# YamBMS — Ruixu BMS RS485  |  Modbus bus declaration
# File: packages/bms/bms_combine_RUIXU_RS485_modbus.yaml
#
# Drop this file alongside bms_combine_RUIXU_RS485_bms_full.yaml in your
# local packages/bms/ folder.
#
# This file declares ONE seplos_modbus bus tied to ONE UART.
# Import it ONCE, even when you have multiple Ruixu packs on the same bus.
#
# Usage (in your main YAML bms: block):
#
#   - path: 'packages/bms/bms_combine_RUIXU_RS485_modbus.yaml'
#     vars:
#       seplos_modbus_uart_id:  'uart_esp_1'
#       seplos_modbus_baud_rate: '9600'   # 9600 or 19200 — check your BMS
# =============================================================================

substitutions:
  seplos_modbus_uart_id:   'uart_esp_1'
  seplos_modbus_baud_rate: '9600'

external_components:
  - source: github://easybotics/esphome-ruixu-bms@main
    components: [seplos_modbus, seplos_bms]
    refresh: 0s

seplos_modbus:
  - id: ruixu_modbus
    uart_id: ${seplos_modbus_uart_id}
    rx_timeout: 150ms
    # Uncomment the line below if your RS485 module has a DE/RE flow control pin:
    # flow_control_pin: GPIO21
