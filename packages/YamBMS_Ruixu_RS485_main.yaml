# =============================================================================
# YamBMS — Ruixu BMS RS485  |  Main device YAML
# Based on YamBMS v1.6.0 (2026.01.14)
#
# Board   : Waveshare ESP32-S3 WS-RS485-CAN
# BMS     : 2× Ruixu 16S packs on UART RS485 (uart_esp_1)
# Inverter: CAN bus PYLON 500k (canbus_inverter_1)
# =============================================================================

# Optional: static IP
# wifi:
#   manual_ip:
#     static_ip: 192.168.0.85
#     gateway: 192.168.0.1
#     subnet: 255.255.255.0

logger:
  level: INFO  # VERBOSE / DEBUG / INFO / WARN

ota:
  - platform: esphome

api:
  reboot_timeout: 0s

# +--------------------------------------+
# | Global Settings                      |
# +--------------------------------------+
substitutions:
  friendly_name:  'YamBMS'
  hostname:       'yambms'
  name:           ''

  # YamBMS charging / protection thresholds
  yambms_id:                 'yambms1'
  yambms_name:               'YamBMS 1'
  yambms_update_interval:    '1s'
  yambms_input_number_mode:  'slider'
  yambms_battery_chemistry:  '1'    # 1=LFP  2=Li-ion  3=LTO
  yambms_cell_count:         '16'   # cells in series per pack

  yambms_bulk_v:    '55.2'   # 3.45V × 16
  yambms_float_v:   '53.6'   # 3.35V × 16
  yambms_rebulk_v:  '52.8'   # 3.30V × 16
  yambms_eoc_timer:    '30'
  yambms_cutoff_timer: '60'

  yambms_max_requested_charge_current:    '200'   # A total across all packs
  yambms_max_requested_discharge_current: '200'   # A total across all packs

  # Temperature-based current limiting tables (C-rate vs °C)
  yambms_charging_rate_table: |
    {
      { -0.1, 0.00 },
      {  0.0, 0.05 },
      {  5.0, 0.12 },
      { 10.0, 0.30 },
      { 20.0, 0.50 },
      { 45.0, 0.50 },
      { 55.0, 0.50 },
      { 60.0, 0.00 }
    }
  yambms_discharging_rate_table: |
    {
      {-30.0, 0.00 },
      {-20.0, 0.50 },
      {  0.0, 0.50 },
      { 45.0, 0.50 },
      { 55.0, 0.50 },
      { 60.0, 0.00 }
    }

  shunt_update_interval: '3s'
  bms_update_interval:   '3s'   # do not go below 3s


# +--------------------------------------+
# | Packages                             |
# +--------------------------------------+

packages:

  # ── Board ─────────────────────────────────────────────────────────────────
  board:
    url: https://github.com/augsburgere/esphome-yambms
    ref: main
    refresh: 60min
    files:
      - path: 'packages/board/board_ESP32-S3_WS-RS485-CAN.yaml'

  # ── Board options (interfaces) ────────────────────────────────────────────
  board_options:
    url: https://github.com/augsburgere/esphome-yambms
    ref: main
    refresh: 60min
    files:
      # UART 1 — RS485 to Ruixu battery packs
      - path: 'packages/board/board_options_itf_uart_esp_1.yaml'
        vars:
          # WS-RS485-CAN board UART1 pins
          uart_esp_1_rx_pin:           'GPIO17'
          uart_esp_1_tx_pin:           'GPIO18'
          uart_esp_1_baud_rate:        '9600'    # change to 19200 if needed
          uart_esp_1_rx_buffer_size:   '384'
          uart_esp_1_flow_control_pin: 'GPIO21'  # WS-RS485-CAN DE/RE pin

      # CAN transceiver — ESP32-S3 built-in CAN on WS-RS485-CAN board
      - path: 'packages/board/board_options_itf_canbus_esp32_can.yaml'
        vars:
          canbus_node_id: 'canbus_inverter_1'
          # WS-RS485-CAN board CAN pins
          canbus_tx_pin: 'GPIO01'
          canbus_rx_pin: 'GPIO02'

  # ── BMS ───────────────────────────────────────────────────────────────────
  # IMPORTANT: the `bms_id` values must be consecutive integers starting at 1.
  # The modbus bus is declared once; pack definitions are added per BMS.
  bms:
    url: https://github.com/augsburgere/esphome-yambms
    ref: main
    refresh: 60min
    files:
      # Ruixu modbus bus — import ONCE regardless of pack count
      - path: 'packages/bms/bms_combine_RUIXU_RS485_modbus.yaml'
        vars:
          seplos_modbus_uart_id:   'uart_esp_1'
          seplos_modbus_baud_rate: '9600'      # match uart baud rate above

      # BMS 1  (DIP switches all OFF = address 0x00)
      - path: 'packages/bms/bms_combine_RUIXU_RS485_bms_full.yaml'
        vars:
          seplos_modbus_id:           'ruixu_modbus'
          bms_id:                     '1'
          bms_name:                   'Ruixu BMS 1'
          bms_address:                '0x00'
          bms_protocol_version:       '0x21'
          bms_max_charge_current:     '100'    # A — your pack rating
          bms_max_discharge_current:  '100'    # A — your pack rating
          bms_cell_ovp:               '3.650'  # V
          bms_cell_uvp:               '2.800'  # V
          bms_balance_trigger_voltage: '0.010' # V

      # BMS 2  (DIP switch 1 ON = address 0x01)
      - path: 'packages/bms/bms_combine_RUIXU_RS485_bms_full.yaml'
        vars:
          seplos_modbus_id:           'ruixu_modbus'
          bms_id:                     '2'
          bms_name:                   'Ruixu BMS 2'
          bms_address:                '0x01'
          bms_protocol_version:       '0x21'
          bms_max_charge_current:     '100'
          bms_max_discharge_current:  '100'
          bms_cell_ovp:               '3.650'
          bms_cell_uvp:               '2.800'
          bms_balance_trigger_voltage: '0.010'

      # BMS 3  (uncomment + change yambms_bms_count to '3' in canbus block)
      # - path: 'packages/bms/bms_combine_RUIXU_RS485_bms_full.yaml'
      #   vars:
      #     seplos_modbus_id:           'ruixu_modbus'
      #     bms_id:                     '3'
      #     bms_name:                   'Ruixu BMS 3'
      #     bms_address:                '0x02'
      #     bms_protocol_version:       '0x21'
      #     bms_max_charge_current:     '100'
      #     bms_max_discharge_current:  '100'
      #     bms_cell_ovp:               '3.650'
      #     bms_cell_uvp:               '2.800'
      #     bms_balance_trigger_voltage: '0.010'

  # ── YamBMS core logic ─────────────────────────────────────────────────────
  yambms:
    url: https://github.com/augsburgere/esphome-yambms
    ref: main
    refresh: 60min
    files:
      - path: 'packages/yambms/yambms.yaml'

  # ── CAN bus output to inverter (PYLON 500k) ───────────────────────────────
  canbus:
    url: https://github.com/augsburgere/esphome-yambms
    ref: main
    refresh: 60min
    files:
      - path: 'packages/yambms/yambms_canbus.yaml'
        vars:
          canbus_id:       'canbus1'
          canbus_name:     'CANBUS 1'
          canbus_node_id:  'canbus_inverter_1'
          canbus_light_id: 'esp_light'
          # The CAN link is considered down if no 0x305 ACK from inverter in 5s
          # (Deye / Sol-Ark only sends 0x305 when it receives the 0x356 frame)
          canbus_link_timer: '5s'

  # ── Debug (requires logger level: DEBUG) ─────────────────────────────────
  debug:
    url: https://github.com/augsburgere/esphome-yambms
    ref: main
    refresh: 60min
    files:
      - path: packages/base/device_debug_ESP32.yaml
        vars:
          debug_name:            'Debug'
          debug_update_interval: '5s'
          debug_psram_size:      '8388608'  # 8Mb PSRAM on WS-RS485-CAN
