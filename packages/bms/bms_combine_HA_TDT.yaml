# Updated : 2026.03.18
# Version : 1.0.3
# Pulls TDT BLE BMS data from Home Assistant API and presents it to YamBMS
# Place this file at: packages/bms/bms_combine_HA_TDT.yaml in your fork

# Required vars (set in main.yaml):
#   bms_id, bms_name, bms_max_charge_current, bms_max_discharge_current,
#   bms_cell_ovp, bms_cell_uvp, bms_balance_trigger_voltage, bms_cell_max_cycles

packages:
  bms_base:            !include bms_base.yaml
  bms_temperature:     !include bms_temperature_sensor_2.yaml
  bms_errors_bitmask:  !include bms_errors_bitmask_JBD.yaml
  bms_battery_soh:     !include bms_base_battery_soh.yaml

# +--------------------------------------+
# | Pull data from Home Assistant        |
# +--------------------------------------+

sensor:

  # ── HA source sensors (internal) ──────────────────────────────────────────

  - platform: homeassistant
    id: bms${bms_id}_ha_total_voltage
    entity_id: sensor.hs010501aa25500075_voltage
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_total_voltage
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_current
    entity_id: sensor.hs010501aa25500075_current
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_current
            state: !lambda return x;
        - sensor.template.publish:
            id: bms${bms_id}_power
            state: !lambda return id(bms${bms_id}_total_voltage).state * x;
        # charging_power / discharging_power required by bms_base_daily_energy.yaml
        - sensor.template.publish:
            id: bms${bms_id}_charging_power
            state: !lambda return x > 0 ? id(bms${bms_id}_total_voltage).state * x : 0;
        - sensor.template.publish:
            id: bms${bms_id}_discharging_power
            state: !lambda return x < 0 ? id(bms${bms_id}_total_voltage).state * -x : 0;

  - platform: homeassistant
    id: bms${bms_id}_ha_soc
    entity_id: sensor.hs010501aa25500075_battery
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_state_of_charge
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_stored_energy
    entity_id: sensor.hs010501aa25500075_stored_energy
    internal: true
    on_value:
      then:
        # stored_energy is Wh, divide by voltage to get Ah for capacity_remaining_ah
        - sensor.template.publish:
            id: bms${bms_id}_capacity_remaining_ah
            state: !lambda return id(bms${bms_id}_total_voltage).state > 0 ? x / id(bms${bms_id}_total_voltage).state : 0;

  - platform: homeassistant
    id: bms${bms_id}_ha_max_cell_voltage
    entity_id: sensor.hs010501aa25500075_highest_cell_voltage
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_max_cell_voltage
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_min_cell_voltage
    entity_id: sensor.hs010501aa25500075_lowest_cell_voltage
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_min_cell_voltage
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_delta_cell_voltage
    entity_id: sensor.hs010501aa25500075_delta_cell_voltage
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_delta_cell_voltage
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_temperature
    entity_id: sensor.hs010501aa25500075_temperature
    internal: true
    filters:
      # Remove this filter if HA already reports in °C
      - lambda: return (x - 32.0) * 5.0 / 9.0;
    on_value:
      then:
        # bms_temperature_sensor_2.yaml needs both _sensor_1 and _sensor_2
        - sensor.template.publish:
            id: bms${bms_id}_temperature_sensor_1
            state: !lambda return x;
        - sensor.template.publish:
            id: bms${bms_id}_temperature_sensor_2
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_charging_cycles
    entity_id: sensor.hs010501aa25500075_cycles
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_charging_cycles_raw
            state: !lambda return x;

  # errors_bitmask — required by bms_errors_bitmask_JBD.yaml
  # Also drives online_status: problem=true means offline, errors_bitmask=1
  - platform: homeassistant
    id: bms${bms_id}_ha_problem
    entity_id: binary_sensor.hs010501aa25500075_problem
    internal: true
    on_state:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_errors_bitmask
            state: !lambda return x ? 1 : 0;
        - binary_sensor.template.publish:
            id: bms${bms_id}_online_status
            state: !lambda return !x;

  # ── Template sensors ───────────────────────────────────────────────────────

  - platform: template
    id: bms${bms_id}_total_voltage
    device_id: bms_${bms_id}
    name: "total voltage"
    unit_of_measurement: V
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement

  - platform: template
    id: bms${bms_id}_current
    device_id: bms_${bms_id}
    name: "current"
    unit_of_measurement: A
    accuracy_decimals: 1
    device_class: current
    state_class: measurement

  - platform: template
    id: bms${bms_id}_power
    device_id: bms_${bms_id}
    name: "power"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement

  - platform: template
    id: bms${bms_id}_charging_power
    device_id: bms_${bms_id}
    name: "charging power"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement

  - platform: template
    id: bms${bms_id}_discharging_power
    device_id: bms_${bms_id}
    name: "discharging power"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement

  - platform: template
    id: bms${bms_id}_state_of_charge
    device_id: bms_${bms_id}
    name: "state of charge"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement

  # capacity_remaining_ah — raw Ah read by bms_base_battery_soc.yaml
  - platform: template
    id: bms${bms_id}_capacity_remaining_ah
    device_id: bms_${bms_id}
    name: "capacity remaining ah"
    unit_of_measurement: Ah
    accuracy_decimals: 1
    state_class: measurement

  # battery_capacity (nominal Ah) — used by YamBMS combine logic
  # Set lambda return value to your actual TDT pack Ah rating
  - platform: template
    id: bms${bms_id}_battery_capacity
    device_id: bms_${bms_id}
    name: "nominal capacity"
    unit_of_measurement: Ah
    accuracy_decimals: 0
    state_class: measurement
    update_interval: 60s
    lambda: return 105;

  - platform: template
    id: bms${bms_id}_max_cell_voltage
    device_id: bms_${bms_id}
    name: "max cell voltage"
    unit_of_measurement: V
    accuracy_decimals: 3
    state_class: measurement

  - platform: template
    id: bms${bms_id}_min_cell_voltage
    device_id: bms_${bms_id}
    name: "min cell voltage"
    unit_of_measurement: V
    accuracy_decimals: 3
    state_class: measurement

  - platform: template
    id: bms${bms_id}_delta_cell_voltage
    device_id: bms_${bms_id}
    name: "delta cell voltage"
    unit_of_measurement: V
    accuracy_decimals: 3
    state_class: measurement

  # cell numbers — TDT BLE BMS does not expose these, default to 0
  - platform: template
    id: bms${bms_id}_min_voltage_cell
    device_id: bms_${bms_id}
    name: "min voltage cell"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: return 0;

  - platform: template
    id: bms${bms_id}_max_voltage_cell
    device_id: bms_${bms_id}
    name: "max voltage cell"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: return 0;

  # Both _sensor_1 and _sensor_2 required by bms_temperature_sensor_2.yaml
  - platform: template
    id: bms${bms_id}_temperature_sensor_1
    device_id: bms_${bms_id}
    name: "temperature 1"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  - platform: template
    id: bms${bms_id}_temperature_sensor_2
    device_id: bms_${bms_id}
    name: "temperature 2"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  # errors_bitmask — required by bms_errors_bitmask_JBD.yaml
  - platform: template
    id: bms${bms_id}_errors_bitmask
    device_id: bms_${bms_id}
    name: "errors bitmask"
    accuracy_decimals: 0
    state_class: measurement

  - platform: template
    id: bms${bms_id}_charging_cycles_raw
    device_id: bms_${bms_id}
    name: "charging cycles raw"
    accuracy_decimals: 0
    state_class: total_increasing

  # cycle_capacity_raw — required by bms_base_battery_soh.yaml
  - platform: template
    id: bms${bms_id}_cycle_capacity_raw
    device_id: bms_${bms_id}
    name: "charging cycle capacity"
    unit_of_measurement: Ah
    state_class: total
    accuracy_decimals: 0
    update_interval: ${bms_update_interval}
    lambda: return id(bms${bms_id}_charging_cycles_raw).state * id(bms${bms_id}_battery_capacity).state;

  # Required settings from vars in main.yaml
  - platform: template
    id: bms${bms_id}_max_charge_current
    device_id: bms_${bms_id}
    name: "max charge current"
    unit_of_measurement: A
    accuracy_decimals: 0
    update_interval: ${bms_update_interval}
    lambda: return ${bms_max_charge_current};

  - platform: template
    id: bms${bms_id}_max_discharge_current
    device_id: bms_${bms_id}
    name: "max discharge current"
    unit_of_measurement: A
    accuracy_decimals: 0
    update_interval: ${bms_update_interval}
    lambda: return ${bms_max_discharge_current};

  - platform: template
    id: bms${bms_id}_cell_ovp
    device_id: bms_${bms_id}
    name: "cell ovp"
    unit_of_measurement: V
    accuracy_decimals: 3
    update_interval: ${bms_update_interval}
    lambda: return ${bms_cell_ovp};

  - platform: template
    id: bms${bms_id}_cell_uvp
    device_id: bms_${bms_id}
    name: "cell uvp"
    unit_of_measurement: V
    accuracy_decimals: 3
    update_interval: ${bms_update_interval}
    lambda: return ${bms_cell_uvp};

  - platform: template
    id: bms${bms_id}_bms_balance_trigger_voltage
    device_id: bms_${bms_id}
    name: "balance trigger voltage"
    unit_of_measurement: V
    accuracy_decimals: 3
    update_interval: ${bms_update_interval}
    lambda: return ${bms_balance_trigger_voltage};

# +--------------------------------------+
# | Binary sensors                       |
# +--------------------------------------+

binary_sensor:

  - platform: homeassistant
    id: bms${bms_id}_ha_charge_mosfet
    entity_id: binary_sensor.hs010501aa25500075_charge_mosfet
    internal: true
    on_state:
      then:
        - binary_sensor.template.publish:
            id: bms${bms_id}_charging_allowed
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_discharge_mosfet
    entity_id: binary_sensor.hs010501aa25500075_discharge_mosfet
    internal: true
    on_state:
      then:
        - binary_sensor.template.publish:
            id: bms${bms_id}_discharging_allowed
            state: !lambda return x;

  # Template binary sensors
  - platform: template
    id: bms${bms_id}_online_status
    device_id: bms_${bms_id}
    name: "online status"

  - platform: template
    id: bms${bms_id}_charging_allowed
    device_id: bms_${bms_id}
    name: "charging"

  - platform: template
    id: bms${bms_id}_discharging_allowed
    device_id: bms_${bms_id}
    name: "discharging"

  # equalizing — TDT BLE BMS has no balancing binary sensor, default false
  - platform: template
    id: bms${bms_id}_bms_equalizing
    device_id: bms_${bms_id}
    name: "balancing"
    lambda: return false;
