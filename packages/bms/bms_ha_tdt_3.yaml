# BMS package that pulls TDT BLE BMS data from Home Assistant
# and presents it to YamBMS as a combined BMS

sensor:
  # --- Pull raw values from HA ---
  - platform: homeassistant
    id: bms${bms_id}_ha_voltage
    entity_id: sensor.hs010501aa25500075_voltage
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_voltage
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_current
    entity_id: sensor.hs010501aa25500075_current
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_current
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_soc
    entity_id: sensor.hs010501aa25500075_battery
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_soc
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_temperature
    entity_id: sensor.hs010501aa25500075_temperature
    internal: true
    filters:
      # Convert F to C if HA is reporting in F
      - lambda: return (x - 32.0) * 5.0 / 9.0;
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_temperature_1
            state: !lambda return x;
        - sensor.template.publish:
            id: bms${bms_id}_max_temperature
            state: !lambda return x;
        - sensor.template.publish:
            id: bms${bms_id}_min_temperature
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_max_cell_v
    entity_id: sensor.hs010501aa25500075_highest_cell_voltage
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_max_cell_voltage
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_min_cell_v
    entity_id: sensor.hs010501aa25500075_lowest_cell_voltage
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_min_cell_voltage
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_delta_v
    entity_id: sensor.hs010501aa25500075_delta_cell_voltage
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_delta_cell_voltage
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_power
    entity_id: sensor.hs010501aa25500075_power
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_power
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_cycles
    entity_id: sensor.hs010501aa25500075_cycles
    internal: true
    on_value:
      then:
        - sensor.template.publish:
            id: bms${bms_id}_charging_cycles
            state: !lambda return x;

  # --- Template sensors YamBMS reads ---
  - platform: template
    id: bms${bms_id}_voltage
    name: "${bms_name} Voltage"
    unit_of_measurement: V
    accuracy_decimals: 2
    device_class: voltage

  - platform: template
    id: bms${bms_id}_current
    name: "${bms_name} Current"
    unit_of_measurement: A
    accuracy_decimals: 1
    device_class: current

  - platform: template
    id: bms${bms_id}_soc
    name: "${bms_name} SoC"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery

  - platform: template
    id: bms${bms_id}_power
    name: "${bms_name} Power"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power

  - platform: template
    id: bms${bms_id}_max_cell_voltage
    name: "${bms_name} Max Cell Voltage"
    unit_of_measurement: V
    accuracy_decimals: 3

  - platform: template
    id: bms${bms_id}_min_cell_voltage
    name: "${bms_name} Min Cell Voltage"
    unit_of_measurement: V
    accuracy_decimals: 3

  - platform: template
    id: bms${bms_id}_delta_cell_voltage
    name: "${bms_name} Delta Cell Voltage"
    unit_of_measurement: V
    accuracy_decimals: 3

  - platform: template
    id: bms${bms_id}_temperature_1
    name: "${bms_name} Temperature 1"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature

  - platform: template
    id: bms${bms_id}_max_temperature
    name: "${bms_name} Max Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature

  - platform: template
    id: bms${bms_id}_min_temperature
    name: "${bms_name} Min Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature

  - platform: template
    id: bms${bms_id}_charging_cycles
    name: "${bms_name} Charging Cycles"
    accuracy_decimals: 0

binary_sensor:
  # Pull charge/discharge MOSFET states from HA
  - platform: homeassistant
    id: bms${bms_id}_ha_charge_mosfet
    entity_id: binary_sensor.hs010501aa25500075_charge_mosfet
    internal: true
    on_state:
      then:
        - binary_sensor.template.publish:
            id: bms${bms_id}_charging
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_discharge_mosfet
    entity_id: binary_sensor.hs010501aa25500075_discharge_mosfet
    internal: true
    on_state:
      then:
        - binary_sensor.template.publish:
            id: bms${bms_id}_discharging
            state: !lambda return x;

  - platform: homeassistant
    id: bms${bms_id}_ha_online
    entity_id: binary_sensor.hs010501aa25500075_problem
    internal: true
    on_state:
      then:
        - binary_sensor.template.publish:
            id: bms${bms_id}_online_status
            state: !lambda return !x;  # problem=true means offline

  - platform: template
    id: bms${bms_id}_charging
    name: "${bms_name} Charging"

  - platform: template
    id: bms${bms_id}_discharging
    name: "${bms_name} Discharging"

  - platform: template
    id: bms${bms_id}_online_status
    name: "${bms_name} Online"
