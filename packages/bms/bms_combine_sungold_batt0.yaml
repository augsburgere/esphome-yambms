
# Updated : 2026.03.22
# Version : 1.0.0
# Pulls Sungold BMS data from Home Assistant API (batt_0) and presents it to YamBMS
# Place this file at: packages/bms/bms_combine_HA_Sungold_batt0.yaml in your fork
#
# Fully self-contained - no nested !include or sub-packages.
# All sub-package content inlined so ${bms_id} substitution works correctly
# when called from main.yaml via remote packages with vars:.
#
# Required vars (set in main.yaml):
#   bms_id, bms_name, bms_ha_device_id, bms_update_interval,
#   bms_max_charge_current, bms_max_discharge_current,
#   bms_cell_ovp, bms_cell_uvp, bms_balance_trigger_voltage, bms_cell_max_cycles,
#   yambms_id, yambms_update_interval, yambms_max_requested_discharge_current
#
# Set in main.yaml for this battery:
#   bms_ha_device_id: yambms_batt_0
#
# Notes:
#   - Power (in/out/net) and daily energy are pulled directly from HA.
#   - All 16 cell voltages are pulled and exposed as template sensors.
#   - 6 temperature sensors pulled; temp 1 & 2 feed YamBMS sensor_1 / sensor_2.
#     Temps 3, 4, mosfet, and environment are exposed as additional template sensors.
#   - Min/max temperature scans all 6 sensors.
#   - Battery capacity is pulled live from HA; swap to a fixed lambda if unavailable.
#   - Temperature assumed °C from HA. Add a F→C filter lambda if your HA reports °F.
#   - No binary_sensor.*_problem entity seen; online_status defaults true on boot.
#     Add a homeassistant binary_sensor source if your device exposes one.
 
# +--------------------------------------+
# | Sub-device registration              |
# +--------------------------------------+
esphome:
  devices:
    - id: bms_${bms_id}
      name: "${bms_name}"
  on_boot:
    then:
      - lambda: id(${yambms_id}_var_bms_counter) += 1;
      - binary_sensor.template.publish:
          id: bms${bms_id}_charging_allowed
          state: true
      - binary_sensor.template.publish:
          id: bms${bms_id}_discharging_allowed
          state: true
      - binary_sensor.template.publish:
          id: bms${bms_id}_online_status
          state: true
 
# +--------------------------------------+
# | Globals                              |
# +--------------------------------------+
globals:
  - id: bms${bms_id}_combined_once
    type: bool
    restore_value: no
    initial_value: "false"
  - id: bms${bms_id}_combined
    type: bool
    restore_value: no
    initial_value: "false"
  - id: bms${bms_id}_var_ext_balancer_online
    type: bool
    restore_value: no
    initial_value: "false"
  - id: bms${bms_id}_var_ext_balancer_equalizing
    type: bool
    restore_value: no
    initial_value: "false"
  - id: bms${bms_id}_var_ext_balancer_trigger_voltage
    type: float
    restore_value: no
    initial_value: '0.0'
 
