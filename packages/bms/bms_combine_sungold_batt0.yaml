    id: bms${bms_id}_temperature_environment
    device_id: bms_${bms_id}
    name: "temperature environment"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
 
  - platform: template
    id: bms${bms_id}_errors_bitmask
    device_id: bms_${bms_id}
    name: "errors bitmask"
    accuracy_decimals: 0
    state_class: measurement
 
  - platform: template
    id: bms${bms_id}_charging_cycles_raw
    device_id: bms_${bms_id}
    name: "charging cycles raw"
    accuracy_decimals: 0
    state_class: total_increasing
 
  - platform: template
    id: bms${bms_id}_cycle_capacity_raw
    device_id: bms_${bms_id}
    name: "charging cycle capacity"
    unit_of_measurement: Ah
    state_class: total
    accuracy_decimals: 0
    update_interval: ${bms_update_interval}
    lambda: return id(bms${bms_id}_charging_cycles_raw).state * id(bms${bms_id}_battery_capacity).state;
 
  - platform: template
    id: bms${bms_id}_max_charge_current
    device_id: bms_${bms_id}
    name: "max charge current"
    unit_of_measurement: A
    accuracy_decimals: 0
    update_interval: ${bms_update_interval}
    lambda: return ${bms_max_charge_current};
 
  - platform: template
    id: bms${bms_id}_max_discharge_current
    device_id: bms_${bms_id}
    name: "max discharge current"
    unit_of_measurement: A
    accuracy_decimals: 0
    update_interval: ${bms_update_interval}
    lambda: return ${bms_max_discharge_current};
 
  - platform: template
    id: bms${bms_id}_cell_ovp
    device_id: bms_${bms_id}
    name: "cell ovp"
    unit_of_measurement: V
    accuracy_decimals: 3
    update_interval: ${bms_update_interval}
    lambda: return ${bms_cell_ovp};
 
  - platform: template
    id: bms${bms_id}_cell_uvp
    device_id: bms_${bms_id}
    name: "cell uvp"
    unit_of_measurement: V
    accuracy_decimals: 3
    update_interval: ${bms_update_interval}
    lambda: return ${bms_cell_uvp};
 
  - platform: template
    id: bms${bms_id}_bms_balance_trigger_voltage
    device_id: bms_${bms_id}
    name: "balance trigger voltage"
    unit_of_measurement: V
    accuracy_decimals: 3
    update_interval: ${bms_update_interval}
    lambda: return ${bms_balance_trigger_voltage};
 
  # ── Balancer trigger voltage ───────────────────────────────────────────────
 
  - platform: template
    id: bms${bms_id}_balance_trigger_voltage
    device_id: bms_${bms_id}
    name: "balancer trigger voltage"
    update_interval: ${bms_update_interval}
    accuracy_decimals: 3
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    filters:
      - or:
        - throttle: 10s
        - delta: 0.001
    lambda: |-
      if (id(bms${bms_id}_var_ext_balancer_online))
        return id(bms${bms_id}_var_ext_balancer_trigger_voltage);
      else
        return id(bms${bms_id}_bms_balance_trigger_voltage).state;
 
  # ── Battery SoC (with low-voltage cutoff) ─────────────────────────────────
 
  - platform: template
    name: "Battery SoC"
    id: bms${bms_id}_battery_soc
    device_id: bms_${bms_id}
    update_interval: ${bms_update_interval}
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    filters:
      - or:
        - throttle: 10s
        - delta: 1
    lambda: |-
      float soc = id(bms${bms_id}_state_of_charge).state;
      float min_cell_v = id(bms${bms_id}_min_cell_voltage).state;
      float cell_low_v = id(bms${bms_id}_cell_uvp).state + 0.2;
      if (min_cell_v <= cell_low_v) return 0;
      else return soc;
 
  - platform: template
    name: "Battery Capacity Remaining"
    id: bms${bms_id}_battery_capacity_remaining
    device_id: bms_${bms_id}
    update_interval: ${bms_update_interval}
    unit_of_measurement: Ah
    state_class: measurement
    icon: mdi:car-battery
    accuracy_decimals: 0
    filters:
      - or:
        - throttle: 10s
        - delta: 1
    lambda: |-
      float bcr = id(bms${bms_id}_capacity_remaining_ah).state;
      float min_cell_v = id(bms${bms_id}_min_cell_voltage).state;
      float cell_low_v = id(bms${bms_id}_cell_uvp).state + 0.2;
      if (min_cell_v <= cell_low_v) return 0;
      else return bcr;
 
  # ── Charging cycles ────────────────────────────────────────────────────────
 
  - platform: template
    name: "charging cycles"
    id: bms${bms_id}_charging_cycles
    device_id: bms_${bms_id}
    update_interval: ${bms_update_interval}
    state_class: total
    icon: mdi:counter
    accuracy_decimals: 0
    filters:
      - or:
        - throttle: 10s
        - delta: 1
    lambda: |-
      float cycles_raw = id(bms${bms_id}_charging_cycles_raw).state;
      if (isnan(cycles_raw)) cycles_raw = 0;
      return cycles_raw + id(bms${bms_id}_charging_cycles_offset).state;
 
  - platform: template
    name: "total charging cycle capacity"
    id: bms${bms_id}_cycle_capacity
    device_id: bms_${bms_id}
    update_interval: ${bms_update_interval}
    unit_of_measurement: Ah
    state_class: total
    icon: mdi:car-battery
    accuracy_decimals: 0
    filters:
      - or:
        - throttle: 10s
        - delta: 1
    lambda: |-
      float capacity_raw = id(bms${bms_id}_cycle_capacity_raw).state;
      if (isnan(capacity_raw)) capacity_raw = 0;
      return capacity_raw +
             id(bms${bms_id}_charging_cycles_offset).state *
             id(bms${bms_id}_battery_capacity).state;
 
  # ── Battery SoH ────────────────────────────────────────────────────────────
 
  - platform: template
    name: "Battery SoH"
    id: bms${bms_id}_battery_soh
    device_id: bms_${bms_id}
    unit_of_measurement: "%"
    device_class: battery
    update_interval: ${bms_update_interval}
    accuracy_decimals: 0
    filters:
      - or:
        - throttle: 10s
        - delta: 1
    lambda: return round(((id(bms${bms_id}_charging_cycles).state/${bms_cell_max_cycles})-1)*-100);
 
  # ── Min / max temperature (scans all 6 sensors) ───────────────────────────
 
  - platform: template
    id: bms${bms_id}_min_temperature
    device_id: bms_${bms_id}
    name: "min temperature"
    update_interval: ${bms_update_interval}
    accuracy_decimals: 1
    unit_of_measurement: °C
    device_class: temperature
    filters:
      - throttle: 10s
      - delta: 0.2
    lambda: |-
      float t1 = id(bms${bms_id}_temperature_sensor_1).state;
      float t2 = id(bms${bms_id}_temperature_sensor_2).state;
      float t3 = id(bms${bms_id}_temperature_3).state;
      float t4 = id(bms${bms_id}_temperature_4).state;
      float tm = id(bms${bms_id}_temperature_mosfet).state;
      float te = id(bms${bms_id}_temperature_environment).state;
      float min_t = t1;
      int min_s = (1 + ${bms_id} * 100);
      if (!isnan(t2) && t2 < min_t) { min_t = t2; min_s = (2 + ${bms_id} * 100); }
      if (!isnan(t3) && t3 < min_t) { min_t = t3; min_s = (3 + ${bms_id} * 100); }
      if (!isnan(t4) && t4 < min_t) { min_t = t4; min_s = (4 + ${bms_id} * 100); }
      if (!isnan(tm) && tm < min_t) { min_t = tm;  min_s = (5 + ${bms_id} * 100); }
      if (!isnan(te) && te < min_t) { min_t = te;  min_s = (6 + ${bms_id} * 100); }
      id(bms${bms_id}_min_temperature_sensor).publish_state(min_s);
      return min_t;
 
  - platform: template
    id: bms${bms_id}_min_temperature_sensor
    device_id: bms_${bms_id}
    name: "min temperature sensor"
    update_interval: ${bms_update_interval}
    accuracy_decimals: 0
    icon: mdi:numeric
    filters:
      - or:
        - throttle: 10s
        - delta: 1
 
  - platform: template
    id: bms${bms_id}_max_temperature
    device_id: bms_${bms_id}
    name: "max temperature"
    update_interval: ${bms_update_interval}
    accuracy_decimals: 1
    unit_of_measurement: °C
    device_class: temperature
    filters:
      - throttle: 10s
      - delta: 0.2
    lambda: |-
      float t1 = id(bms${bms_id}_temperature_sensor_1).state;
      float t2 = id(bms${bms_id}_temperature_sensor_2).state;
      float t3 = id(bms${bms_id}_temperature_3).state;
      float t4 = id(bms${bms_id}_temperature_4).state;
      float tm = id(bms${bms_id}_temperature_mosfet).state;
      float te = id(bms${bms_id}_temperature_environment).state;
      float max_t = t1;
      int max_s = (1 + ${bms_id} * 100);
      if (!isnan(t2) && t2 > max_t) { max_t = t2; max_s = (2 + ${bms_id} * 100); }
      if (!isnan(t3) && t3 > max_t) { max_t = t3; max_s = (3 + ${bms_id} * 100); }
      if (!isnan(t4) && t4 > max_t) { max_t = t4; max_s = (4 + ${bms_id} * 100); }
      if (!isnan(tm) && tm > max_t) { max_t = tm;  max_s = (5 + ${bms_id} * 100); }
      if (!isnan(te) && te > max_t) { max_t = te;  max_s = (6 + ${bms_id} * 100); }
      id(bms${bms_id}_max_temperature_sensor).publish_state(max_s);
      return max_t;
 
  - platform: template
    id: bms${bms_id}_max_temperature_sensor
    device_id: bms_${bms_id}
    name: "max temperature sensor"
    update_interval: ${bms_update_interval}
    accuracy_decimals: 0
    icon: mdi:numeric
    filters:
      - or:
        - throttle: 10s
        - delta: 1
 
  # ── YamBMS errors bitmask ──────────────────────────────────────────────────
  # Sungold does not expose a raw bitmask; online_status drives errors_bitmask.
  # Bit mapping follows JBD convention as used in the TDT file.
 
  - platform: template
    id: bms${bms_id}_yambms_errors_bitmask
    device_id: bms_${bms_id}
    name: "YamBMS Errors Bitmask"
    update_interval: ${bms_update_interval}
    accuracy_decimals: 0
    icon: mdi:alert-circle-outline
    filters:
      - or:
        - throttle: 10s
        - delta: 1
    lambda: |-
      uint16_t bms_errors_bitmask = (uint16_t)id(bms${bms_id}_errors_bitmask).state;
      uint16_t yambms_errors_bitmask = 0;
      if (bms_errors_bitmask > 0)
      {
        if (bms_errors_bitmask & 0x0001) yambms_errors_bitmask |= 0x0002;
        if (bms_errors_bitmask & 0x0002) yambms_errors_bitmask |= 0x0004;
        if (bms_errors_bitmask & 0x0004) yambms_errors_bitmask |= 0x0002;
        if (bms_errors_bitmask & 0x0008) yambms_errors_bitmask |= 0x0004;
        if (bms_errors_bitmask & 0x0010) yambms_errors_bitmask |= 0x0020;
        if (bms_errors_bitmask & 0x0020) yambms_errors_bitmask |= 0x0040;
        if (bms_errors_bitmask & 0x0040) yambms_errors_bitmask |= 0x0008;
        if (bms_errors_bitmask & 0x0080) yambms_errors_bitmask |= 0x0010;
        if (bms_errors_bitmask & 0x0100) yambms_errors_bitmask |= 0x0100;
        if (bms_errors_bitmask & 0x0200) yambms_errors_bitmask |= 0x0080;
        if (bms_errors_bitmask & 0x0400) yambms_errors_bitmask |= 0x0400;
        if (bms_errors_bitmask & 0x0800) yambms_errors_bitmask |= 0x0800;
        if (bms_errors_bitmask & 0x1000) yambms_errors_bitmask |= 0x0800;
        if (bms_errors_bitmask & 0x2000) yambms_errors_bitmask |= 0x0800;
        if (bms_errors_bitmask & 0x4000) yambms_errors_bitmask |= 0x0000;
        if (bms_errors_bitmask & 0x8000) yambms_errors_bitmask |= 0x0000;
      }
      return yambms_errors_bitmask;
 
# +--------------------------------------+
# | Number entities                      |
# +--------------------------------------+
number:
  - platform: template
    name: "Charging Cycles Offset"
    id: bms${bms_id}_charging_cycles_offset
    device_id: bms_${bms_id}
    step: 1
    min_value: 0
    max_value: 3000
    initial_value: 0
    restore_value: true
    icon: mdi:counter
    optimistic: true
    entity_category: config
 
# +--------------------------------------+
# | Binary sensors                       |
# +--------------------------------------+
binary_sensor:
 
  - platform: template
    id: bms${bms_id}_online_status
    device_id: bms_${bms_id}
    name: "online status"
 
  - platform: template
    id: bms${bms_id}_charging_allowed
    device_id: bms_${bms_id}
    name: "charging"
 
  - platform: template
    id: bms${bms_id}_discharging_allowed
    device_id: bms_${bms_id}
    name: "discharging"
 
  - platform: template
    id: bms${bms_id}_bms_equalizing
    device_id: bms_${bms_id}
    name: "balancing"
    lambda: return false;
 
  - platform: template
    id: bms${bms_id}_equalizing
    device_id: bms_${bms_id}
    name: "equalizing"
    lambda: |-
      if (id(bms${bms_id}_var_ext_balancer_online))
        return id(bms${bms_id}_var_ext_balancer_equalizing);
      else
        return id(bms${bms_id}_bms_equalizing).state;
 
  - platform: template
    name: "Can be combined"
    id: bms${bms_id}_can_be_combined
    device_id: bms_${bms_id}
    lambda: return (id(bms${bms_id}_online_status).state && id(bms${bms_id}_battery_capacity).state > 0);
 
# +--------------------------------------+
# | Combine interval                     |
# +--------------------------------------+
interval:
  - interval: ${yambms_update_interval}
    then:
      - lambda: |-
          if (id(${yambms_id}_var_to_combine_bms_number) == ${bms_id})
          {
            if (id(bms${bms_id}_can_be_combined).state)
            {
              if (id(bms${bms_id}_combined_once) == false)
              {
                id(${yambms_id}_var_total_installed_battery_capacity) += id(bms${bms_id}_battery_capacity).state;
                id(bms${bms_id}_combined_once) = true;
              }
 
              if (id(bms${bms_id}_combined) == false)
              {
                id(${yambms_id}_var_to_combine_bms_counter) += 1;
                id(bms${bms_id}_combined) = true;
              }
 
              if (id(bms${bms_id}_yambms_errors_bitmask).state > 0)
              {
                uint16_t errors_bitmask = id(bms${bms_id}_yambms_errors_bitmask).state;
                id(${yambms_id}_var_errors_bitmask) |= errors_bitmask;
                id(${yambms_id}_var_errors_bitmask_counter) += 1;
              }
 
              if (id(bms${bms_id}_charging_allowed).state)
              {
                id(${yambms_id}_var_charging_allowed_counter) += 1;
                id(${yambms_id}_var_total_max_charge_current) += id(bms${bms_id}_max_charge_current).state;
              }
              else id(${yambms_id}_var_bms_blocking_charge_counter) += 1;
 
              if (id(bms${bms_id}_discharging_allowed).state)
              {
                id(${yambms_id}_var_discharging_allowed_counter) += 1;
                id(${yambms_id}_var_total_max_discharge_current) += id(bms${bms_id}_max_discharge_current).state;
                if(id(${yambms_id}_var_total_max_discharge_current) > ${yambms_max_requested_discharge_current})
                {
                  id(${yambms_id}_var_total_max_discharge_current) = ${yambms_max_requested_discharge_current};
                }
              }
              else id(${yambms_id}_var_bms_blocking_discharge_counter) += 1;
 
              id(${yambms_id}_var_bms_total_voltage) += id(bms${bms_id}_total_voltage).state;
              id(${yambms_id}_var_bms_total_current) += id(bms${bms_id}_current).state;
              id(${yambms_id}_var_bms_total_power) += id(bms${bms_id}_power).state;
              id(${yambms_id}_var_total_battery_capacity) += id(bms${bms_id}_battery_capacity).state;
              id(${yambms_id}_var_total_battery_capacity_remaining) += id(bms${bms_id}_battery_capacity_remaining).state;
              id(${yambms_id}_var_bms_total_soh) += id(bms${bms_id}_battery_soh).state;
              id(${yambms_id}_var_total_charging_cycles) += id(bms${bms_id}_charging_cycles).state;
 
              if (id(bms${bms_id}_equalizing).state) id(${yambms_id}_var_equalizing_counter) += 1;
 
              if (id(bms${bms_id}_balance_trigger_voltage).state > id(${yambms_id}_var_max_balance_trigger_voltage))
                id(${yambms_id}_var_max_balance_trigger_voltage) = id(bms${bms_id}_balance_trigger_voltage).state;
 
              if (id(bms${bms_id}_min_cell_voltage).state < id(${yambms_id}_var_min_cell_voltage))
              {
                id(${yambms_id}_var_min_cell_voltage) = id(bms${bms_id}_min_cell_voltage).state;
                id(${yambms_id}_var_min_voltage_cell) = id(bms${bms_id}_min_voltage_cell).state + (${bms_id} * 100);
              }
 
              if (id(bms${bms_id}_max_cell_voltage).state > id(${yambms_id}_var_max_cell_voltage))
              {
                id(${yambms_id}_var_max_cell_voltage) = id(bms${bms_id}_max_cell_voltage).state;
                id(${yambms_id}_var_max_voltage_cell) = id(bms${bms_id}_max_voltage_cell).state + (${bms_id} * 100);
              }
 
              if (id(bms${bms_id}_cell_ovp).state < id(${yambms_id}_var_min_cell_ovp))
                id(${yambms_id}_var_min_cell_ovp) = id(bms${bms_id}_cell_ovp).state;
 
              if (id(bms${bms_id}_cell_uvp).state > id(${yambms_id}_var_max_cell_uvp))
                id(${yambms_id}_var_max_cell_uvp) = id(bms${bms_id}_cell_uvp).state;
 
              if (id(bms${bms_id}_min_temperature).state < id(${yambms_id}_var_min_temperature))
              {
                id(${yambms_id}_var_min_temperature) = id(bms${bms_id}_min_temperature).state;
                id(${yambms_id}_var_min_temperature_sensor) = id(bms${bms_id}_min_temperature_sensor).state;
              }
 
              if (id(bms${bms_id}_max_temperature).state > id(${yambms_id}_var_max_temperature))
              {
                id(${yambms_id}_var_max_temperature) = id(bms${bms_id}_max_temperature).state;
                id(${yambms_id}_var_max_temperature_sensor) = id(bms${bms_id}_max_temperature_sensor).state;
              }
            }
            else if (id(bms${bms_id}_combined) == true)
            {
              id(${yambms_id}_var_to_combine_bms_counter) -= 1;
              id(bms${bms_id}_combined) = false;
            }
 
            id(${yambms_id}_var_to_combine_bms_number)++;
          }
